<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Postcard previews · AI Brain Coach</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=JetBrains+Mono:wght@400;500;600&amp;family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,600;1,8..60,400&amp;display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="/styles.css" />
  <link rel="stylesheet" href="/styles-list.css" />
  <style>
    .pv-main {
      max-width: 820px;
      margin: 0 auto;
      padding: 20px 28px 48px;
    }
    .pv-gallery {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .pv-preview-card .pv-frame {
      width: 100%;
      height: 280px;
      background: var(--surface-2, #faf9f7);
      border-top: 1px solid var(--line, #e5e2dc);
    }
    .pv-preview-card .pv-frame iframe {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
    }
    .pv-err {
      font-size: 13px;
      color: var(--danger, #b42318);
      padding: 14px 18px;
      background: var(--danger-soft, #fef3f2);
      margin: 0;
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="brand-name">Postcard previews</span>
      <span class="brand-sub">AI Brain Coach · PDF gallery · PostGrid</span>
    </div>
    <span class="topbar-spacer" aria-hidden="true"></span>
  </header>

  <div class="pv-main">
    <main id="gallery" class="pv-gallery" aria-live="polite"></main>
  </div>

  <script>
    (function () {
      var PREVIEW_META_KEY = 'postcardPreviewMeta';

      var root = document.getElementById('gallery');
      var params = new URLSearchParams(window.location.search);
      var idsParam = params.get('ids') || '';
      var ids = idsParam
        .split(',')
        .map(function (s) {
          var t = String(s).trim();
          try {
            return decodeURIComponent(t);
          } catch (e) {
            return t;
          }
        })
        .filter(Boolean)
        .slice(0, 30);

      var rawSession = null;
      var rawLocal = null;
      try {
        rawSession = sessionStorage.getItem(PREVIEW_META_KEY);
      } catch (e) {
        rawSession = null;
      }
      try {
        rawLocal = localStorage.getItem(PREVIEW_META_KEY);
      } catch (e) {
        rawLocal = null;
      }
      var meta = {};
      try {
        meta = JSON.parse(rawLocal || rawSession || '{}');
      } catch (e) {
        console.warn('[previews] Failed to parse preview meta JSON', e);
        meta = {};
      }

      console.log('[previews] meta loaded for', Object.keys(meta).length, 'postcards');

      function sleep(ms) {
        return new Promise(function (r) {
          setTimeout(r, ms);
        });
      }

      function esc(s) {
        return String(s)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;');
      }

      function metaForId(id) {
        if (!id) return {};
        var m = meta[id];
        if (m && typeof m === 'object') return m;
        var dec = id;
        try {
          dec = decodeURIComponent(id);
        } catch (e) {}
        if (dec !== id && meta[dec]) return meta[dec];
        return {};
      }

      function captionLine(id, m) {
        var name = m && m.contractorname != null ? String(m.contractorname).trim() : '';
        var permit = m && m.permitnum != null ? String(m.permitnum).trim() : '';
        if (name) return name + (permit ? ' · ' + permit : '');
        if (permit) return permit;
        return id;
      }

      function postgridMetaLine(id) {
        return 'PostGrid: ' + id;
      }

      if (!ids.length) {
        root.innerHTML =
          '<div class="card"><p class="pv-err">No postcard IDs in this link. Run the pipeline from the app and use “View all postcards”.</p></div>';
        return;
      }

      async function loadAll() {
        for (var i = 0; i < ids.length; i++) {
          if (i > 0) await sleep(120);
          var id = ids[i];
          var m = metaForId(id);
          var titleText = captionLine(id, m);
          var metaLine = postgridMetaLine(id);

          var card = document.createElement('article');
          card.className = 'card pv-preview-card';

          var head = document.createElement('div');
          head.className = 'card-head';
          var h2 = document.createElement('h2');
          h2.className = 'card-title';
          h2.textContent = titleText;
          var metaEl = document.createElement('p');
          metaEl.className = 'card-meta';
          metaEl.textContent = metaLine;
          head.appendChild(h2);
          head.appendChild(metaEl);

          var frame = document.createElement('div');
          frame.className = 'pv-frame';
          frame.innerHTML =
            '<p style="padding:14px 18px;margin:0;color:var(--muted);font-size:13px;">Loading PDF…</p>';

          card.appendChild(head);
          card.appendChild(frame);
          root.appendChild(card);

          try {
            var res = await fetch('/api/postcard-preview?id=' + encodeURIComponent(id));
            var body = await res.json().catch(function () {
              return null;
            });
            if (!res.ok || !body || !body.url) {
              frame.innerHTML =
                '<p class="pv-err" style="border:0;background:transparent;">' +
                esc((body && body.error) || 'Preview not available yet.') +
                '</p>';
              continue;
            }
            frame.innerHTML = '';
            var iframe = document.createElement('iframe');
            iframe.title = 'Postcard PDF · ' + id;
            iframe.src = body.url;
            iframe.setAttribute('loading', 'lazy');
            frame.appendChild(iframe);
          } catch (err) {
            frame.innerHTML =
              '<p class="pv-err" style="border:0;background:transparent;">' +
              esc(err.message || String(err)) +
              '</p>';
          }
        }
      }

      loadAll();
    })();
  </script>
</body>
</html>
